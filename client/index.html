<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>Souris Fun</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="loginScreen">
      <div class="login-container">
        <h1>🎮 Souris Fun</h1>
        <input
          type="text"
          id="loginUsername"
          placeholder="Ton nom d'utilisateur..."
        />
        <input type="file" id="loginImage" accept="image/*" />
        <div class="image-preview" id="imagePreview">
          <span style="color: #999">Aperçu</span>
        </div>
        <button id="loginButton">Commencer</button>
      </div>
    </div>

    <div id="gameScreen">
      <div id="leaderboard" class="leaderboard">
        <h3>🏆 Classement</h3>
        <div id="leaderboardList"></div>
        <div class="chat-hint">💬 Appuie sur "/" ou "1" pour parler</div>
      </div>
      <div id="ui" style="position: absolute; z-index: 100; display: none">
        <input
          type="text"
          id="chatInput"
          placeholder="Appuie sur Entrée pour parler..."
          style="
            padding: 10px;
            border-radius: 20px;
            border: 2px solid #333;
            width: 300px;
          "
        />
      </div>
      <div class="scoreboard">
        Mon score : <span class="score-value" id="playerScore">0</span>
      </div>
    </div>
    <script src="/socket.io/socket.io.js"></script>
    <script>
      const socket = io();
      const cursors = {};
      const userInfo = {}; // Stocker username et image pour chaque user
      let myMessage = "";
      let myUsername = "";
      let myImage = "";
      let messageTimer = null;
      let myId = null;
      let inputActive = false;
      let mouseX = 0;
      let mouseY = 0;
      let isConnected = false;
      let myScore = 0;
      const targets = {};

      // Créer un avatar par défaut simple
      function createDefaultAvatar() {
        const canvas = document.createElement("canvas");
        canvas.width = 64;
        canvas.height = 64;
        const ctx = canvas.getContext("2d");

        // Couleur aléatoire
        const colors = [
          "#FF6B6B",
          "#4ECDC4",
          "#45B7D1",
          "#FFA07A",
          "#98D8C8",
          "#F7DC6F",
        ];
        const color = colors[Math.floor(Math.random() * colors.length)];

        ctx.fillStyle = color;
        ctx.fillRect(0, 0, 64, 64);

        ctx.fillStyle = "white";
        ctx.font = "bold 32px Arial";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText("?", 32, 32);

        return canvas.toDataURL("image/png");
      }

      // Elements DOM
      const loginScreen = document.getElementById("loginScreen");
      const gameScreen = document.getElementById("gameScreen");
      const loginUsername = document.getElementById("loginUsername");
      const loginImage = document.getElementById("loginImage");
      const imagePreview = document.getElementById("imagePreview");
      const loginButton = document.getElementById("loginButton");
      const chatInput = document.getElementById("chatInput");
      const ui = document.getElementById("ui");
      const playerScoreEl = document.getElementById("playerScore");
      const leaderboardList = document.getElementById("leaderboardList");

      // Gestion de l'aperçu d'image
      loginImage.addEventListener("change", (e) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = (event) => {
            myImage = event.target.result;
            imagePreview.innerHTML = `<img src="${myImage}" />`;
          };
          reader.readAsDataURL(file);
        }
      });

      // Connexion
      loginButton.addEventListener("click", () => {
        const username = loginUsername.value.trim();
        console.log("Bouton cliqué, username:", username);
        if (!username) {
          alert("Veuillez entrer un nom d'utilisateur!");
          return;
        }

        myUsername = username;

        // Si pas d'image, en créer une par défaut, sinon utiliser celle sélectionnée
        const finalImage = myImage || createDefaultAvatar();
        myImage = finalImage;

        // Envoyer l'image et le nom au serveur
        socket.emit("user_login", {
          username: myUsername,
          image: finalImage,
        });

        // Afficher la page de jeu
        isConnected = true;
        loginScreen.classList.add("hidden");
        gameScreen.classList.add("show");
        chatInput.focus();

        // Créer mon propre curseur
        setTimeout(() => {
          if (myId && !cursors[myId]) {
            const el = document.createElement("div");
            el.className = "cursor";
            el.innerHTML = `
              <img src="${myImage}" alt="cursor" id="img-${myId}">
              <div class="bubble" id="bubble-${myId}"></div>
              <div class="username" id="username-${myId}">${myUsername}</div>
            `;
            document.body.appendChild(el);
            cursors[myId] = el;
            el.style.left = mouseX + "px";
            el.style.top = mouseY + "px";
          }
        }, 100);
      });

      // Obtenir mon ID quand je me connecte
      socket.on("connect", () => {
        myId = socket.id;
      });

      // Tracer la position de la souris
      window.addEventListener("mousemove", (e) => {
        mouseX = e.clientX;
        mouseY = e.clientY;

        // Mettre à jour mon propre curseur
        if (cursors[myId]) {
          cursors[myId].style.left = mouseX + "px";
          cursors[myId].style.top = mouseY + "px";

          // Mettre à jour ma bulle de message
          const myBubble = document.getElementById(`bubble-${myId}`);
          if (myBubble) {
            if (myMessage && myMessage.trim() !== "") {
              myBubble.innerText = myMessage;
              myBubble.style.display = "block";
            } else {
              myBubble.style.display = "none";
            }
          }
        }

        if (inputActive) {
          ui.style.left = mouseX + "px";
          ui.style.top = mouseY + 20 + "px";
        }
      });

      // Activer l'input avec la touche "/" ou "1"
      window.addEventListener("keydown", (e) => {
        if ((e.key === "/" || e.key === "1") && !inputActive && isConnected) {
          e.preventDefault();
          inputActive = true;
          ui.style.display = "block";
          ui.style.left = mouseX + "px";
          ui.style.top = mouseY + 20 + "px";
          chatInput.focus();
        }
      });

      // 1. Gérer la saisie du message
      chatInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
          myMessage = chatInput.value;
          chatInput.value = ""; // Vide l'input
          inputActive = false;
          ui.style.display = "none";

          // Supprimer le message automatiquement après 5 secondes
          clearTimeout(messageTimer);
          messageTimer = setTimeout(() => {
            myMessage = "";
          }, 5000);
        } else if (e.key === "Escape") {
          chatInput.value = "";
          inputActive = false;
          ui.style.display = "none";
        }
      });

      // 2. Envoyer ma position et mon message (username déjà envoyé lors de la connexion)
      setInterval(() => {
        if (isConnected) {
          socket.emit("mouse_move", {
            x: mouseX,
            y: mouseY,
            message: myMessage,
          });
        }
      }, 50);

      // Recevoir les utilisateurs existants
      socket.on("existing_users", (existingUsers) => {
        existingUsers.forEach((user) => {
          userInfo[user.id] = user; // Stocker les infos
          if (!cursors[user.id]) {
            const el = document.createElement("div");
            el.className = "cursor";
            const imgSrc =
              user.image ||
              "https://cdn-icons-png.flaticon.com/512/751/751381.png";
            el.innerHTML = `
                    <img src="${imgSrc}" alt="cursor">
                    <div class="bubble" id="bubble-${user.id}"></div>
                    <div class="username" id="username-${user.id}">${user.username}</div>
                  `;
            document.body.appendChild(el);
            cursors[user.id] = el;
          }
        });
      });

      function updateOrCreateCursor(user) {
        userInfo[user.id] = user; // On stocke les infos (image + pseudo)

        if (cursors[user.id]) {
          // Le curseur existe déjà (créé par user_update), on remplace l'image et le nom
          const img = document.getElementById(`img-${user.id}`);
          const nameTag = document.getElementById(`username-${user.id}`);
          if (img)
            img.src =
              user.image ||
              "https://cdn-icons-png.flaticon.com/512/751/751381.png";
          if (nameTag) nameTag.innerText = user.username;
        } else {
          // Le curseur n'existe pas, on le crée normalement
          const el = document.createElement("div");
          el.className = "cursor";
          el.innerHTML = `
                  <img src="${user.image || "https://cdn-icons-png.flaticon.com/512/751/751381.png"}" alt="cursor" id="img-${user.id}">
                  <div class="bubble" id="bubble-${user.id}"></div>
                  <div class="username" id="username-${user.id}">${user.username}</div>
              `;
          document.body.appendChild(el);
          cursors[user.id] = el;
        }
      }

      // Utilisation des nouvelles fonctions
      socket.on("existing_users", (usersList) => {
        usersList.forEach((user) => updateOrCreateCursor(user));
      });

      socket.on("new_user", (user) => {
        updateOrCreateCursor(user);
      });

      // Mise à jour position
      socket.on("user_update", (data) => {
        cursors[data.id].style.left = data.x + "px";
        cursors[data.id].style.top = data.y + "px";

        // SÉCURITÉ : Si l'image est celle par défaut mais que 'data' en contient une vraie, on met à jour
        const currentImg = document.getElementById(`img-${data.id}`);
        if (data.image && currentImg && currentImg.src.includes("flaticon")) {
          currentImg.src = data.image;
          document.getElementById(`username-${data.id}`).innerText =
            data.username;
        }

        // Mise à jour de la bulle
        const bubble = document.getElementById(`bubble-${data.id}`);
        if (bubble) {
          if (data.message && data.message.trim() !== "") {
            bubble.innerText = data.message;
            bubble.style.display = "block";
          } else {
            bubble.style.display = "none";
          }
        }
      });

      // Gérer la déconnexion d'un utilisateur
      socket.on("user_disconnected", (userId) => {
        if (cursors[userId]) {
          cursors[userId].remove();
          delete cursors[userId];
        }
        delete userInfo[userId];
      });

      // Recevoir les cibles générées par le serveur
      socket.on("spawn_target", (targetData) => {
        if (!targets[targetData.id]) {
          const targetEl = document.createElement("div");
          targetEl.className = "target";
          targetEl.id = `target-${targetData.id}`;
          targetEl.style.left = targetData.x + "px";
          targetEl.style.top = targetData.y + "px";
          document.body.appendChild(targetEl);
          targets[targetData.id] = {
            x: targetData.x,
            y: targetData.y,
            el: targetEl,
          };
        }
      });

      // Enlever une cible
      socket.on("target_hit", (targetData) => {
        if (targets[targetData.id]) {
          targets[targetData.id].el.remove();
          delete targets[targetData.id];
        }
      });

      // Recevoir les points
      socket.on("score_update", (data) => {
        if (data.userId === myId) {
          myScore += data.points;
          playerScoreEl.innerText = myScore;
        }
      });

      // Recevoir le leaderboard
      socket.on("leaderboard_update", (leaderboard) => {
        updateLeaderboard(leaderboard);
      });

      // Mettre à jour l'affichage du leaderboard
      function updateLeaderboard(leaderboard) {
        leaderboardList.innerHTML = "";
        leaderboard.forEach((player, index) => {
          const item = document.createElement("div");
          item.className = "leaderboard-item";

          const playerName = document.createElement("span");
          playerName.className =
            player.id === myId ? "leaderboard-player me" : "leaderboard-player";
          playerName.textContent = `${index + 1}. ${player.username}`;

          const playerScore = document.createElement("span");
          playerScore.className = "leaderboard-score";
          playerScore.textContent = `${player.score} pts`;

          item.appendChild(playerName);
          item.appendChild(playerScore);
          leaderboardList.appendChild(item);
        });
      }

      // Vérifier collision avec les cibles
      function checkTargetCollision() {
        Object.keys(targets).forEach((targetId) => {
          const target = targets[targetId];
          const distance = Math.sqrt(
            Math.pow(mouseX - target.x, 2) + Math.pow(mouseY - target.y, 2),
          );

          if (distance < 25) {
            // 25 pixels de rayon
            socket.emit("hit_target", { targetId });
          }
        });
      }

      // Vérifier collision toutes les 50ms
      setInterval(() => {
        if (isConnected) {
          checkTargetCollision();
        }
      }, 50);
    </script>
  </body>
</html>
